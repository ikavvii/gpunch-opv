name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend base URL baked into the APK"
        required: true
        default: "https://animated-memory-444rr9rrgpwf6rr-3000.app.github.dev/"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    env:
      BACKEND_URL: ${{ github.event.inputs.backend_url || 'https://animated-memory-444rr9rrgpwf6rr-3000.app.github.dev/' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installable debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug -PBASE_URL="${BACKEND_URL}"

      - name: Prepare release artifact
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/app-debug.apk "../dist/GPunch-${GITHUB_REF_NAME:-manual}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPunch-APK
          path: dist/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: GPunch ${{ github.ref_name }}
          body: |
            GPunch Android APK.

            Backend URL baked into this build:
            `${{ env.BACKEND_URL }}`

            Install by downloading the APK on an Android device and allowing installation from unknown sources.
          files: dist/*.apk
